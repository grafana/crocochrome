name: Publish container

permissions:
  contents: none

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # Needed for the version script to work.
          persist-credentials: false

      - name: Compute repo metadata
        id: repo
        run: |-
          echo "version=$(./scripts/version)" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          cache-binary: false # https://woodruffw.github.io/zizmor/audits/#cache-poisoning
      - name: Log into ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: . # Use checked out repo with full history, instead of letting build making a shallow clone.
          tags: |-
            ghcr.io/${{ github.repository }}:${{ steps.repo.outputs.version }}
          push: true
          platforms: linux/amd64,linux/arm64
