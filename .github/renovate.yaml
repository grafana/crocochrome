"$schema": "https://docs.renovatebot.com/renovate-schema.json"

extends:
  - github>grafana/grafana-renovate-config//presets/shared-workflows
  - github>grafana/sm-renovate//presets/grafana.json5
  - github>grafana/sm-renovate//presets/synthetic-monitoring.json5
  - github>grafana/sm-renovate//presets/go.json5
  - github>grafana/sm-renovate//presets/grafana-build-tools.json5

ignorePresets:
  - github>grafana/grafana-renovate-config//presets/automerge

customManagers:
  - # Update k6 v1 image used for integration tests only.
    customType: regex
    depNameTemplate: grafana/k6-v1
    packageNameTemplate: grafana/k6
    datasourceTemplate: docker
    managerFilePatterns:
      - '**/*_test.go'
    matchStrings:
      - 'k6V1ImageVersion\s*=\s*"grafana/k6:(?<currentValue>[\w.-]+)"'

  - # Update k6 v2 image used for integration tests only.
    customType: regex
    depNameTemplate: grafana/k6-v2
    packageNameTemplate: grafana/k6
    datasourceTemplate: docker
    managerFilePatterns:
      - '**/*_test.go'
    matchStrings:
      - 'k6V2ImageVersion\s*=\s*"grafana/k6:(?<currentValue>[\w.-]+)"'

packageRules:
  - # The default "docker" versioning will try to restrict upgrades to versions
    # that do not change everything after a dash (-) for the current tag, as
    # this typically indicates the "flavor" (e.g. postgresql:17.1-alpine will
    # not be upgraded to postgresql:17.2-debian).
    #
    # This image in particular has lots of dashes and does not follow this
    # convention, so we force "loose" versioning which is pretty much an
    # alphabetical sort.
    matchPackageNames:
      - ghcr.io/grafana/chromium-swiftshader-alpine
    versioning: loose

  - matchPackageNames:
      - grafana/k6-v1
    matchCurrentVersion: '>=1.0.0 <2.0.0'
    allowedVersions: '<2.0.0'

  - matchPackageNames:
      - grafana/k6-v2
    matchCurrentVersion: '>=2.0.0 <3.0.0'
    allowedVersions: '<3.0.0'
